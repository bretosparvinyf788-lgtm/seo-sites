name: Publish Hipobuy July 24 guide

on:
  push:
    branches:
      - main
    paths:
      - hipobuyvip.shop/.publish/hipobuy-2026-07-24.flag

permissions:
  contents: write

jobs:
  patch-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch and validate homepage
        run: python .github/scripts/publish_hipobuy_20260724.py

      - name: Commit homepage update
        run: |
          git diff --check
          git diff --quiet -- hipobuyvip.shop/index.html && { echo "Expected homepage change was not produced"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hipobuyvip.shop/index.html
          git commit -m "Feature latest Hipobuy guides on homepage"
          git push origin HEAD:main
