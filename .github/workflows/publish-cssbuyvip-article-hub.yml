name: Publish cssbuyvip.com Article Hub

on:
  push:
    branches:
      - main
    paths:
      - 'cssbuyvip.com/article-manifest.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cssbuyvip-com-article-hub
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main branch
        run: git pull --rebase origin main

      - name: Update homepage and complete article archive
        run: python3 tools/update_cssbuyvip_article_hub.py

      - name: Generate sitemap
        run: python3 tools/generate_cssbuyvip_sitemap.py

      - name: Validate publication
        run: |
          python3 - <<'PY'
          import json
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = Path('cssbuyvip.com')
          manifest = json.loads((root / 'article-manifest.json').read_text(encoding='utf-8'))
          latest = sorted(manifest, key=lambda item: item['published'], reverse=True)[:3]
          home = (root / 'index.html').read_text(encoding='utf-8')
          archive = (root / 'all-seo-articles.html').read_text(encoding='utf-8')

          section = re.search(
              r'<section class="section"><div class="wrap"><section id="articles" class="panel">(.*?)</section></div></section>',
              home,
              re.S,
          )
          if not section:
              raise SystemExit('Homepage article section not found')
          cards = re.findall(r'<a class="article" href="/([^"]+)"', section.group(1))
          expected = [item['slug'] for item in latest]
          if cards != expected:
              raise SystemExit(f'Homepage latest guides mismatch: {cards} != {expected}')

          for item in manifest:
              if f'href="/{item["slug"]}"' not in archive:
                  raise SystemExit(f'Archive missing {item["slug"]}')

          sitemap = ET.parse(root / 'sitemap.xml').getroot()
          ns = {'sm': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          urls = {node.text for node in sitemap.findall('sm:url/sm:loc', ns)}
          newest_url = 'https://cssbuyvip.com/' + latest[0]['slug']
          if newest_url not in urls:
              raise SystemExit(f'Sitemap missing {newest_url}')
          print(f'Validated {len(manifest)} archive articles and homepage latest 3')
          PY

      - name: Commit generated publication files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cssbuyvip.com/index.html cssbuyvip.com/all-seo-articles.html cssbuyvip.com/articles.html cssbuyvip.com/latest-guides.js cssbuyvip.com/sitemap.xml
          if git diff --cached --quiet; then
            echo "Article hub is already current"
          else
            git commit -m "Publish cssbuyvip.com daily SEO article hub"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Verify live Cloudflare deployment
        run: |
          set -euo pipefail
          ARTICLE_SLUG="$(python3 - <<'PY'
          import json
          from pathlib import Path
          items = json.loads(Path('cssbuyvip.com/article-manifest.json').read_text(encoding='utf-8'))
          items.sort(key=lambda item: item['published'], reverse=True)
          print(items[0]['slug'])
          PY
          )"
          ARTICLE_TITLE="$(python3 - <<'PY'
          import json
          from pathlib import Path
          items = json.loads(Path('cssbuyvip.com/article-manifest.json').read_text(encoding='utf-8'))
          items.sort(key=lambda item: item['published'], reverse=True)
          print(items[0]['title'])
          PY
          )"
          export ARTICLE_SLUG ARTICLE_TITLE

          verified=0
          for attempt in $(seq 1 30); do
            stamp="${GITHUB_RUN_ID}-${attempt}"
            if article_html="$(curl -fsSL --max-time 25 "https://cssbuyvip.com/${ARTICLE_SLUG}?verify=${stamp}")" \
              && home_html="$(curl -fsSL --max-time 25 "https://cssbuyvip.com/?verify=${stamp}")" \
              && archive_html="$(curl -fsSL --max-time 25 "https://cssbuyvip.com/all-seo-articles.html?verify=${stamp}")" \
              && sitemap_xml="$(curl -fsSL --max-time 25 "https://cssbuyvip.com/sitemap.xml?verify=${stamp}")"; then
              if printf '%s' "$article_html" | grep -Fq "$ARTICLE_TITLE" \
                && printf '%s' "$home_html" | grep -Fq "/$ARTICLE_SLUG" \
                && printf '%s' "$archive_html" | grep -Fq "/$ARTICLE_SLUG" \
                && printf '%s' "$sitemap_xml" | grep -Fq "https://cssbuyvip.com/$ARTICLE_SLUG"; then
                verified=1
                break
              fi
            fi
            sleep 10
          done

          if [ "$verified" -ne 1 ]; then
            echo "Live deployment verification failed for $ARTICLE_SLUG" >&2
            exit 1
          fi

          mkdir -p .github/deployment-verification
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          slug = os.environ['ARTICLE_SLUG']
          report = {
              "status": "passed",
              "checked_at": datetime.now(timezone.utc).isoformat(),
              "domain": "cssbuyvip.com",
              "article_url": f"https://cssbuyvip.com/{slug}",
              "homepage": "https://cssbuyvip.com/",
              "archive": "https://cssbuyvip.com/all-seo-articles.html",
              "sitemap": "https://cssbuyvip.com/sitemap.xml",
              "checks": {
                  "article_title_present": True,
                  "homepage_latest_guides_present": True,
                  "archive_contains_article": True,
                  "sitemap_contains_article": True
              }
          }
          Path('.github/deployment-verification/cssbuyvip.com.json').write_text(
              json.dumps(report, indent=2) + "\n",
              encoding='utf-8'
          )
          PY

      - name: Record successful live verification
        run: |
          git add .github/deployment-verification/cssbuyvip.com.json
          git commit -m "Verify live cssbuyvip.com SEO deployment"
          git pull --rebase origin main
          git push origin main
