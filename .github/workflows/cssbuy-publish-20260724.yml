name: Publish CSSBuy Daily SEO 2026-07-24

on:
  push:
    branches:
      - main
    paths:
      - '.github/cssbuy-sync-guides-all-langs-trigger-20260724-sensitive-route-matrix.txt'
      - '.github/cssbuy-article-20260724/*.json'
      - '.github/workflows/cssbuy-publish-20260724.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cssbuy-publish-20260724
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main branch
        run: git pull --rebase origin main

      - name: Publish article into all language arrays
        run: python3 cssbuyvip/tools/sync_latest_guides.py

      - name: Validate homepage and article ordering
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          slug = 'cssbuy-sensitive-item-route-matrix-parcel-segmentation-2026'
          path = Path('cssbuyvip/index.html')
          html = path.read_text(encoding='utf-8')
          match = re.search(r"const SITE_DATA = (\{.*?\});\nlet currentLang", html, re.S)
          if not match:
              raise SystemExit('SITE_DATA not found')
          data = json.loads(match.group(1))
          for lang in ('en', 'zh', 'es', 'de', 'pt'):
              articles = data['articles'][lang]
              if not articles or articles[0].get('slug') != slug:
                  raise SystemExit(f'{lang}: latest article is not first')
              first_three = [a.get('slug') for a in articles[:3]]
              if len(first_three) != len(set(first_three)):
                  raise SystemExit(f'{lang}: duplicate topic in latest three')
          english = data['articles']['en'][0]
          words = sum(len(str(section[1]).split()) for section in english['body'])
          if not 1200 <= words <= 1800:
              raise SystemExit(f'English body word count out of range: {words}')
          required = (
              'SITE_DATA.articles[currentLang].slice(0,3)',
              'SITE_DATA.articles[currentLang].map',
              'category-grid',
              'product-grid',
              'featured-products',
              'latest-guides',
              slug,
          )
          for marker in required:
              if marker not in html:
                  raise SystemExit(f'Missing marker: {marker}')
          if '/blog/' in json.dumps(english):
              raise SystemExit('Article payload contains /blog/')
          print(f'Validated article, homepage order and {words} English words')
          PY

      - name: Commit only homepage article data
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add cssbuyvip/index.html
          if git diff --cached --quiet; then
            echo "Article already published"
            exit 0
          fi
          git commit -m "Publish July 24 CSSBuy sensitive item route guide"
          git push origin HEAD:main
