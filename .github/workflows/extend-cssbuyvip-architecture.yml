name: Extend CSSBuyVip Architecture

on:
  push:
    branches: [main]
    paths:
      - 'tools/extend_cssbuyvip_architecture.py'
      - '.github/workflows/extend-cssbuyvip-architecture.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cssbuyvip-architecture-extension
  cancel-in-progress: false

jobs:
  extend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Compile and run architecture update
        run: |
          python3 -m py_compile tools/extend_cssbuyvip_architecture.py
          python3 tools/extend_cssbuyvip_architecture.py
      - name: Validate required static pages
        run: |
          python3 - <<'PY'
          from pathlib import Path
          required = [
            'cssbuyvip/cssbuy-spreadsheet-clothing/index.html',
            'cssbuyvip/cssbuy-spreadsheet-hoodies/index.html',
            'cssbuyvip/cssbuy-spreadsheet-bags/index.html',
            'cssbuyvip/cssbuy-spreadsheet-accessories/index.html',
            'cssbuyvip.com/guides/index.html',
            'cssbuyvip/about/index.html',
            'cssbuyvip.com/about/index.html',
          ]
          for item in required:
              p=Path(item)
              assert p.exists(), item
              text=p.read_text(encoding='utf-8')
              assert '<link rel="canonical"' in text, item
              assert '<h1>' in text, item
          print('Static architecture pages validated')
          PY
      - name: Commit homepage architecture update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cssbuyvip/index.html cssbuyvip.com/index.html
          if git diff --cached --quiet; then
            echo "Homepage architecture already current"
            exit 0
          fi
          git commit -m "Connect CSSBuyVip homepages to category and trust pages"
          git push origin HEAD:main
