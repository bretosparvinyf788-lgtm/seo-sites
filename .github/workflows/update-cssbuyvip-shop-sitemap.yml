name: Update cssbuyvip.shop Sitemap

on:
  push:
    branches:
      - main
    paths:
      - 'cssbuyvip/**/*.html'
      - 'tools/generate_cssbuyvip_shop_sitemap.py'
      - '.github/workflows/update-cssbuyvip-shop-sitemap.yml'
  schedule:
    - cron: '35 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cssbuyvip-shop-sitemap
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main branch
        run: git pull --rebase origin main

      - name: Generate sitemap
        run: python3 tools/generate_cssbuyvip_shop_sitemap.py

      - name: Validate sitemap XML
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          path = Path('cssbuyvip/sitemap.xml')
          root = ET.parse(path).getroot()
          namespace = {'sm': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          urls = root.findall('sm:url', namespace)
          if not urls:
              raise SystemExit('Sitemap contains no URLs')
          print(f'Validated {len(urls)} sitemap URLs')
          PY

      - name: Commit sitemap when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cssbuyvip/sitemap.xml
          if git diff --cached --quiet; then
            echo "Sitemap is already current"
            exit 0
          fi
          git commit -m "Auto-update cssbuyvip.shop sitemap"
          git push origin HEAD:main
