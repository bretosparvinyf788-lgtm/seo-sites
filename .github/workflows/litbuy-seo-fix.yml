name: One-time LitBuy SEO fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/litbuy-seo-fix.yml

permissions:
  contents: write

jobs:
  fix-litbuy-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update indexability and discovery files
        shell: bash
        run: |
          python <<'PY'
          from datetime import date
          from pathlib import Path
          from urllib.parse import quote
          import html
          import re

          root = Path("litbuyvip.shop")
          index = root / "index.html"
          text = index.read_text(encoding="utf-8")

          text, robots_count = re.subn(
              r'<meta\s+content=["\']noindex,\s*nofollow["\']\s+name=["\']robots["\']\s*/?>',
              '<meta content="index,follow" name="robots"/>',
              text,
              count=1,
              flags=re.IGNORECASE,
          )
          text, cache_count = re.subn(
              r'<meta\s+http-equiv=["\']Cache-Control["\']\s+content=["\'][^"\']*(?:no-store|no-cache)[^"\']*["\']\s*/?>',
              '',
              text,
              count=1,
              flags=re.IGNORECASE,
          )

          if robots_count != 1:
              raise SystemExit(f"Expected one noindex robots meta, replaced {robots_count}")
          if cache_count != 1:
              raise SystemExit(f"Expected one no-store/no-cache Cache-Control meta, removed {cache_count}")

          index.write_text(text, encoding="utf-8")

          base = "https://litbuyvip.shop"
          urls = []
          for page in sorted(root.rglob("*.html")):
              rel = page.relative_to(root).as_posix()
              if rel == "index.html":
                  path = "/"
              elif rel.endswith("/index.html"):
                  path = "/" + rel[:-10]
              else:
                  path = "/" + rel
              urls.append(base + quote(path, safe="/"))

          urls = list(dict.fromkeys(urls))
          today = date.today().isoformat()
          sitemap = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
          ]
          for url in urls:
              sitemap.extend([
                  "  <url>",
                  f"    <loc>{html.escape(url)}</loc>",
                  f"    <lastmod>{today}</lastmod>",
                  "  </url>",
              ])
          sitemap.append("</urlset>")
          (root / "sitemap.xml").write_text("\n".join(sitemap) + "\n", encoding="utf-8")

          (root / "robots.txt").write_text(
              "User-agent: *\n"
              "Allow: /\n\n"
              "Sitemap: https://litbuyvip.shop/sitemap.xml\n",
              encoding="utf-8",
          )

          updated = index.read_text(encoding="utf-8").lower()
          if 'content="noindex,nofollow"' in updated:
              raise SystemExit("noindex,nofollow is still present")
          if "no-store" in updated or "no-cache" in updated:
              raise SystemExit("no-store/no-cache is still present in index.html")
          PY

      - name: Commit directly to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add litbuyvip.shop/index.html litbuyvip.shop/sitemap.xml litbuyvip.shop/robots.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Fix LitBuy indexing and add sitemap and robots"
          git push origin HEAD:main
