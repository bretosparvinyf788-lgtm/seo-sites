name: CSSBuy Force Four Long Guides

on:
  push:
    paths:
      - '.github/cssbuy-force-four-long-guides-*.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-guides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force four long guides
        run: python3 cssbuyvip/tools/force_four_long_guides.py
      - name: Commit repaired guides
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add cssbuyvip/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Force four long SEO guides"
            git push
          fi
