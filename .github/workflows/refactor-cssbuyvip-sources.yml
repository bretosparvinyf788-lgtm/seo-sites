name: Refactor CSSBuyVip Source Pages

on:
  push:
    branches:
      - main
    paths:
      - 'tools/refactor_cssbuyvip_sources.py'
      - 'tools/run_cssbuyvip_source_refactor.py'
      - '.github/workflows/refactor-cssbuyvip-sources.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cssbuyvip-source-refactor
  cancel-in-progress: false

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main branch
        run: git pull --rebase origin main

      - name: Compile refactor scripts
        run: |
          python3 -m py_compile tools/refactor_cssbuyvip_sources.py
          python3 -m py_compile tools/run_cssbuyvip_source_refactor.py

      - name: Refactor source HTML and simplify workers
        run: python3 tools/run_cssbuyvip_source_refactor.py

      - name: Validate static guide files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          paths = [
              Path('cssbuyvip/guides/best-cssbuy-spreadsheet-2026/index.html'),
              Path('cssbuyvip/guides/cssbuy-shipping-cost-guide/index.html'),
              Path('cssbuyvip/guides/cssbuy-qc-photos-guide/index.html'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              assert '<link rel="canonical"' in text, path
              assert '<h1>' in text, path
              assert 'application/ld+json' in text, path
              words = len(re.findall(r"\b[\w’'-]+\b", re.sub(r'<[^>]+>', ' ', text)))
              assert words >= 1200, (path, words)
              print(path, words)
          PY

      - name: Commit source refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cssbuyvip cssbuyvip.com
          if git diff --cached --quiet; then
            echo "Source pages are already refactored"
            exit 0
          fi
          git commit -m "Refactor CSSBuyVip source pages and static guide routes"
          git pull --rebase origin main
          git push origin HEAD:main
