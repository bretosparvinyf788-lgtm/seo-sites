name: Validate cssbuyvip.com Live Publication on Push

on:
  push:
    branches:
      - main
    paths:
      - '.github/cssbuyvip-live-validate-20260722.trigger'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cssbuyvip-com-live-validation-20260722
  cancel-in-progress: false

jobs:
  validate-live:
    runs-on: ubuntu-latest
    timeout-minutes: 16
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for production and validate all public routes
        shell: bash
        run: |
          set -u
          ARTICLE='https://cssbuyvip.com/guides/cssbuy-return-exchange-decision-tree-2026/'
          HOME='https://cssbuyvip.com/'
          ARCHIVE='https://cssbuyvip.com/all-seo-articles/'
          SITEMAP='https://cssbuyvip.com/sitemap.xml'
          passed=0

          for attempt in $(seq 1 36); do
            token="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            article_code=$(curl -L -sS --max-time 30 -o article.html -w '%{http_code}' "${ARTICLE}?check=${token}" || true)
            home_code=$(curl -L -sS --max-time 30 -o home.html -w '%{http_code}' "${HOME}?check=${token}" || true)
            archive_code=$(curl -L -sS --max-time 30 -o archive.html -w '%{http_code}' "${ARCHIVE}?check=${token}" || true)
            sitemap_code=$(curl -L -sS --max-time 30 -o sitemap.xml -w '%{http_code}' "${SITEMAP}?check=${token}" || true)

            echo "Attempt ${attempt}: article=${article_code} home=${home_code} archive=${archive_code} sitemap=${sitemap_code}"

            if [ "$article_code" = 200 ] && [ "$home_code" = 200 ] && [ "$archive_code" = 200 ] && [ "$sitemap_code" = 200 ]; then
              if ARTICLE_CODE="$article_code" HOME_CODE="$home_code" ARCHIVE_CODE="$archive_code" SITEMAP_CODE="$sitemap_code" python3 - <<'PY'
from pathlib import Path
from datetime import datetime, timezone
from html import unescape
import json
import os
import re

article = Path('article.html').read_text(encoding='utf-8', errors='ignore')
home = Path('home.html').read_text(encoding='utf-8', errors='ignore')
archive = Path('archive.html').read_text(encoding='utf-8', errors='ignore')
sitemap = Path('sitemap.xml').read_text(encoding='utf-8', errors='ignore')

article_url = 'https://cssbuyvip.com/guides/cssbuy-return-exchange-decision-tree-2026/'
required_article = [
    '<title>CSSBuy Return & Exchange Guide 2026 | 7-Day Warehouse Clock</title>',
    'CSSBuy Return Clock 2026: Decide Before Storage Becomes a Distraction',
    'CSSBuy Returns and Exchanges FAQ',
    'What conditions does CSSBuy publicly list for a return?',
    '<span>CSSBuy returns</span>',
]
for marker in required_article:
    assert marker in article, f'missing article marker: {marker}'
assert 'Best CSSBuy Spreadsheet for QC-ready finds and smarter shipping.' not in article, 'article is homepage fallback'
for forbidden in ('Official sources checked', '>Sources<', '>References<', '资料来源', '核实来源'):
    assert forbidden.lower() not in article.lower(), f'forbidden public source block: {forbidden}'

fragment_match = re.search(r'<article class="article wrap">([\s\S]*?)</article>', article)
assert fragment_match, 'visible article body missing'
fragment = fragment_match.group(1)
plain = unescape(re.sub(r'<[^>]+>', ' ', fragment))
visible_words = len(re.findall(r"\b[\w’'-]+\b", plain))
faq_count = fragment.count('<details>')
print(f'Visible article words: {visible_words}; FAQ entries: {faq_count}')
assert 1500 <= visible_words <= 2000, f'visible article word count is {visible_words}'
assert faq_count == 15, f'FAQ count is {faq_count}'

section_match = re.search(r'<section id="articles" class="panel">([\s\S]*?)</section>', home)
assert section_match, 'homepage article section missing'
section = section_match.group(1)
article_count = section.count('class="article"')
assert article_count == 3, f'homepage Latest Guides count is {article_count}'
expected_titles = (
    'CSSBuy Return Clock 2026: Returns and Exchanges',
    'CSSBuy Seller Communication Playbook 2026',
    'CSSBuy Cost Ledger 2026: Fees, Deposits and Final Charges',
)
for title in expected_titles:
    assert title in section, f'homepage missing latest title: {title}'
assert 'CSSBuy Parcel Audit 2026' not in section, 'older guide displaced a newer guide'

assert '/guides/cssbuy-return-exchange-decision-tree-2026/' in archive, 'archive missing new guide URL'
assert 'July 22, 2026' in archive, 'archive missing new guide date'
assert f'<loc>{article_url}</loc>' in sitemap, 'sitemap missing new guide URL'

for name in ('ARTICLE_CODE', 'HOME_CODE', 'ARCHIVE_CODE', 'SITEMAP_CODE'):
    assert os.environ[name] == '200', f'{name} is not 200'

record = {
    'status': 'passed',
    'checked_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
    'domain': 'cssbuyvip.com',
    'article_url': article_url,
    'article_http_status': 200,
    'homepage_http_status': 200,
    'archive_http_status': 200,
    'sitemap_http_status': 200,
    'visible_article_word_count': visible_words,
    'faq_count': faq_count,
    'article_title_verified': True,
    'article_body_verified': True,
    'faq_verified': True,
    'homepage_latest_guides_count': article_count,
    'homepage_latest_order_verified': True,
    'archive_link_verified': True,
    'sitemap_link_verified': True,
    'homepage_fallback_detected': False,
    'public_source_block_detected': False,
}
Path('cssbuyvip.com/live-validation-20260722.json').write_text(json.dumps(record, indent=2) + '\n', encoding='utf-8')
print('Live validation passed')
PY
              then
                passed=1
                break
              fi
            fi
            sleep 20
          done

          if [ "$passed" != 1 ]; then
            echo 'Production did not pass validation within the retry window.'
            echo '--- article head ---'; head -40 article.html 2>/dev/null || true
            echo '--- homepage article markers ---'; grep -n 'CSSBuy Return\|Latest SEO\|article-list' home.html 2>/dev/null | head -30 || true
            echo '--- archive markers ---'; grep -n 'cssbuy-return-exchange' archive.html 2>/dev/null || true
            echo '--- sitemap markers ---'; grep -n 'cssbuy-return-exchange' sitemap.xml 2>/dev/null || true
            exit 1
          fi

      - name: Commit successful production validation record
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add cssbuyvip.com/live-validation-20260722.json
          if git diff --cached --quiet; then
            echo 'Validation record already current'
          else
            git commit -m 'Record successful July 22 cssbuyvip.com live validation'
            git push origin HEAD:main
          fi
