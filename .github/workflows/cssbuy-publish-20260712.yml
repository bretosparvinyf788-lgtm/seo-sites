name: Publish CSSBuy Daily SEO 2026-07-12

on:
  push:
    paths:
      - '.github/cssbuy-publish-20260712-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Isolate validated payload and update SPA
        run: |
          mkdir -p /tmp/cssbuy-other-triggers
          find .github -maxdepth 1 -type f -name 'cssbuy-sync-guides-all-langs-trigger-*.txt' ! -name 'cssbuy-sync-guides-all-langs-trigger-20260712-daily-seo.txt' -exec mv {} /tmp/cssbuy-other-triggers/ \;
          python3 cssbuyvip/tools/sync_latest_guides.py
          grep -q 'cssbuy-qc-photos-7-day-return-window-warehouse-workflow-2026' cssbuyvip/index.html
      - name: Commit only the SPA homepage file
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add cssbuyvip/index.html
          if git diff --cached --quiet; then
            echo "Article already present"
          else
            git commit -m "Publish CSSBuy QC and 7-day return workflow guide"
            git push
          fi
